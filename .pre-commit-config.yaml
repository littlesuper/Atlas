# Atlas pre-commit hooks.
#
# Atlas is a TypeScript monorepo. The source quality-system template also
# includes Python/Ruff/mypy hooks, but those are intentionally omitted here
# because this repository has no Python application runtime.

default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^package-lock\.json$
      - id: end-of-file-fixer
        exclude: ^package-lock\.json$
      - id: check-yaml
      - id: check-json
        exclude: (^|/)(tsconfig|tsconfig\..*)\.json$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            package-lock\.json|
            \.secrets\.baseline
          )$

  - repo: local
    hooks:
      - id: atlas-eslint
        name: Atlas ESLint
        entry: npm run lint -- --quiet
        language: system
        pass_filenames: false
        types_or: [javascript, jsx, ts, tsx]

      - id: atlas-high-audit
        name: Atlas high/critical dependency audit
        entry: npm audit --audit-level=high
        language: system
        pass_filenames: false
        files: ^(package\.json|package-lock\.json|client/package\.json|server/package\.json)$
