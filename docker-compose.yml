version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/atlas.db
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET 环境变量}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?请设置 JWT_REFRESH_SECRET 环境变量}
      CORS_ORIGINS: ${CORS_ORIGINS:?请设置 CORS_ORIGINS 环境变量}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-}
      RISK_SCHEDULER_ENABLED: ${RISK_SCHEDULER_ENABLED:-false}
      RISK_SCHEDULER_CRON: ${RISK_SCHEDULER_CRON:-0 8 * * 1-5}
    volumes:
      - atlas-data:/data
      - atlas-uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  atlas-data:      # SQLite 数据库文件
  atlas-uploads:   # 用户上传文件
