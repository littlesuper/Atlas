version: '3.8'

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atlas_dev_password}
      POSTGRES_DB: atlas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://atlas:${DB_PASSWORD:-atlas_dev_password}@db:5432/atlas
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET 环境变量}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?请设置 JWT_REFRESH_SECRET 环境变量}
      CORS_ORIGINS: ${CORS_ORIGINS:?请设置 CORS_ORIGINS 环境变量}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-}
      RISK_SCHEDULER_ENABLED: ${RISK_SCHEDULER_ENABLED:-false}
      RISK_SCHEDULER_CRON: ${RISK_SCHEDULER_CRON:-0 8 * * 1-5}
    volumes:
      - uploads:/app/server/uploads

volumes:
  pgdata:
  uploads:
