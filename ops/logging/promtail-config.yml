server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: atlas-app
    static_configs:
      - targets:
          - localhost
        labels:
          service: atlas
          environment: local
          stream: stdout
          __path__: /var/log/atlas/app.log
      - targets:
          - localhost
        labels:
          service: atlas
          environment: local
          stream: stderr
          __path__: /var/log/atlas/error.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            trace_id: trace_id
            user_id: user_id
            method: context.method
            url: context.url
            status_code: context.status_code
            duration_ms: context.duration_ms
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
